<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Dylan Gorrah — Frontend Developer & Software Development Tutor based in Bloemfontein, South Africa." />
<title>Dylan Gorrah — Frontend Developer</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css" />

<style>
/* ── Variables ──────────────────────────────────────────────────── */
:root {
  --bg:           #06060A;
  --surface:      rgba(255,255,255,0.030);
  --surface-h:    rgba(255,255,255,0.062);
  --bdr:          rgba(255,255,255,0.068);
  --bdr-h:        rgba(255,255,255,0.18);
  --accent:       #C9A96E;
  --accent-dim:   rgba(201,169,110,0.55);
  --accent-faint: rgba(201,169,110,0.075);
  --txt:          #EAE8E3;
  --txt-dim:      rgba(234,232,227,0.55);
  --txt-faint:    rgba(234,232,227,0.28);
  --green:        #3B9E6C;
  --green-bg:     rgba(59,158,108,0.07);
  --green-bdr:    rgba(59,158,108,0.18);
  --cold:         rgba(110,148,255,0.09);
  --panel-bg:     rgba(7,7,10,0.98);
  /* Orbit */
  --r-in:    90px;
  --r-out:   140px;
  --scene:   320px;
  --p-size:  120px;
  --i-in:    34px;
  --i-out:   26px;
}
@media(min-width:768px){
  :root{ --r-in:112px;--r-out:170px;--scene:400px;--p-size:140px;--i-in:38px;--i-out:30px }
}
@media(min-width:1024px){
  :root{ --r-in:142px;--r-out:216px;--scene:510px;--p-size:172px;--i-in:44px;--i-out:34px }
}

/* ── Reset ──────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
a{text-decoration:none;color:inherit}
button{font-family:'Outfit',sans-serif;cursor:pointer;border:none;background:none}
svg{display:block;flex-shrink:0}

/* ── Background layers ──────────────────────────────────────────── */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none}

/* Dot grid */
.bg-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,0.038) 1px,transparent 0);
  background-size:38px 38px;
  mask-image:radial-gradient(ellipse at center,black 25%,transparent 68%);
  -webkit-mask-image:radial-gradient(ellipse at center,black 25%,transparent 68%);
}

/* Scanlines — subtle CRT effect */
.scanlines{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.025) 3px,rgba(0,0,0,0.025) 4px);
}

/* Noise grain */
.noise{
  position:fixed;inset:-50%;width:200%;height:200%;z-index:1;pointer-events:none;opacity:0.038;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:256px 256px;
}

/* Ambient mouse-light (desktop) */
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(700px circle at var(--mx,50%) var(--my,50%),rgba(201,169,110,0.038),transparent 45%);
}

/* ── Orbit ──────────────────────────────────────────────────────── */
.orbit-scene{position:relative;width:var(--scene);height:var(--scene);margin:0 auto;flex-shrink:0}

.orbit-ring{
  position:absolute;top:50%;left:50%;border-radius:50%;
  transform:translate(-50%,-50%);
  border:1px solid rgba(255,255,255,0.055);
}
.orbit-ring.r1{
  width:calc(var(--r-in)*2 + 8px);height:calc(var(--r-in)*2 + 8px);
  box-shadow:0 0 50px var(--cold),inset 0 0 50px var(--cold);
  border-color:rgba(110,148,255,0.12);
}
.orbit-ring.r2{
  width:calc(var(--r-out)*2 + 8px);height:calc(var(--r-out)*2 + 8px);
  border-color:rgba(255,255,255,0.038);
  box-shadow:0 0 70px rgba(110,148,255,0.04);
}
.orbit-ring.r3{
  width:calc(var(--r-out)*2 + 70px);height:calc(var(--r-out)*2 + 70px);
  border-color:rgba(255,255,255,0.016);
}

.arm{position:absolute;top:50%;left:50%;width:0;height:0}
.arm-cw {animation:spinCW  30s linear infinite}
.arm-ccw{animation:spinCCW 50s linear infinite}

.icon-chip{
  position:absolute;display:flex;align-items:center;justify-content:center;border-radius:8px;
  background:rgba(10,9,15,0.96);border:1px solid rgba(255,255,255,0.082);
  box-shadow:0 4px 28px rgba(0,0,0,0.75),inset 0 1px 0 rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  transition:border-color 0.28s,box-shadow 0.28s;
}
.icon-chip:hover{
  border-color:rgba(201,169,110,0.35);
  box-shadow:0 4px 28px rgba(0,0,0,0.75),0 0 18px rgba(201,169,110,0.14),inset 0 1px 0 rgba(255,255,255,0.07);
}

.ic-in{
  width:var(--i-in);height:var(--i-in);
  transform:translateX(var(--r-in)) translateY(-50%);
  animation:counterCW 30s linear infinite;
}
.ic-out{
  width:var(--i-out);height:var(--i-out);border-radius:6px;
  background:rgba(8,7,12,0.90);border:1px solid rgba(255,255,255,0.048);opacity:0.5;
  transform:translateX(var(--r-out)) translateY(-50%);
  animation:counterCCW 50s linear infinite;
}
.ic-in i {font-size:15px;color:var(--txt-dim)}
.ic-out i{font-size:11px;color:var(--txt-faint)}
@media(min-width:768px){.ic-in i{font-size:18px}.ic-out i{font-size:13px}}
@media(min-width:1024px){.ic-in i{font-size:21px}.ic-out i{font-size:15px}}
/* Keep colored devicons visible; Next.js icon is black — invert it on dark bg */
.devicon-nextjs-original{filter:brightness(0) invert(0.82) sepia(1) saturate(0) hue-rotate(0deg)}

/* Profile */
.profile{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:var(--p-size);height:var(--p-size);border-radius:50%;
  background:linear-gradient(150deg,#111019,#1B1928);
  border:1px solid rgba(201,169,110,0.22);
  display:flex;align-items:center;justify-content:center;overflow:hidden;z-index:10;cursor:pointer;
  box-shadow:
    0 0 0 7px rgba(201,169,110,0.04),
    0 0 60px rgba(201,169,110,0.11),
    0 0 110px rgba(110,148,255,0.06),
    inset 0 1px 0 rgba(255,255,255,0.07);
  transition:box-shadow 0.4s,border-color 0.4s;
}
.profile:hover{
  box-shadow:
    0 0 0 12px rgba(201,169,110,0.06),
    0 0 80px rgba(201,169,110,0.20),
    0 0 130px rgba(110,148,255,0.08),
    inset 0 1px 0 rgba(255,255,255,0.09);
  border-color:rgba(201,169,110,0.38);
}
.profile img{width:100%;height:100%;object-fit:cover;object-position:center top;pointer-events:none}
.profile-initials{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:0.08em;color:var(--accent)}
@media(min-width:1024px){.profile-initials{font-size:48px}}

/* ── Keyframes ──────────────────────────────────────────────────── */
@keyframes spinCW  {to{transform:rotate(360deg)}}
@keyframes spinCCW {to{transform:rotate(-360deg)}}
@keyframes counterCW {from{transform:translateX(var(--r-in)) translateY(-50%) rotate(0deg)}to{transform:translateX(var(--r-in)) translateY(-50%) rotate(-360deg)}}
@keyframes counterCCW{from{transform:translateX(var(--r-out)) translateY(-50%) rotate(0deg)}to{transform:translateX(var(--r-out)) translateY(-50%) rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 6px var(--green)}50%{opacity:0.2;box-shadow:0 0 2px var(--green)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* ── Hero ───────────────────────────────────────────────────────── */
.hero{
  position:relative;z-index:3;
  display:flex;flex-direction:column;align-items:center;
  padding:26px 20px 16px;gap:14px;text-align:center;
}

.hero-status{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--green-bg);border:1px solid var(--green-bdr);
  border-radius:3px;padding:5px 14px;
  font-family:'Space Mono',monospace;font-size:8.5px;
  color:var(--green);letter-spacing:0.16em;text-transform:uppercase;
  opacity:0;animation:fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) forwards;animation-delay:0.15s;
}
.avail-dot{
  width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;
  animation:pulse 2.6s ease-in-out infinite;
}

.orbit-wrap{opacity:0;animation:fadeUp 0.9s cubic-bezier(0.22,1,0.36,1) forwards;animation-delay:0.35s}

.hero-text{opacity:0;animation:fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) forwards;animation-delay:0.75s;width:100%}

.hero-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(52px,14.5vw,116px);
  letter-spacing:0.06em;color:var(--txt);line-height:0.9;
  text-transform:uppercase;white-space:nowrap;
  text-shadow:0 0 90px rgba(201,169,110,0.07),0 2px 0 rgba(0,0,0,0.9);
}

.hero-rule{
  display:flex;align-items:center;justify-content:center;gap:12px;margin:10px 0 8px;
}
.hero-rule-line{
  flex:1;max-width:60px;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent-dim));
}
.hero-rule-line.flip{background:linear-gradient(90deg,var(--accent-dim),transparent)}
.hero-rule-diamond{
  width:5px;height:5px;border:1px solid var(--accent-dim);
  transform:rotate(45deg);flex-shrink:0;
}

.hero-role{
  font-family:'Space Mono',monospace;
  font-size:9px;color:var(--txt-faint);letter-spacing:0.22em;text-transform:uppercase;
}
.hero-role::after{content:'_';animation:blink 1.1s step-end infinite;color:var(--accent-dim)}

.hero-meta{
  display:flex;align-items:center;justify-content:center;gap:14px;
  margin-top:6px;
}
.hero-meta-item{
  font-family:'Space Mono',monospace;font-size:7.5px;
  color:rgba(234,232,227,0.18);letter-spacing:0.14em;text-transform:uppercase;
}
.hero-meta-dot{width:2px;height:2px;border-radius:50%;background:rgba(234,232,227,0.14);flex-shrink:0}

/* ── Nav ────────────────────────────────────────────────────────── */
.nav{
  display:flex;flex-wrap:wrap;justify-content:center;gap:7px;
  padding:0 20px 32px;position:relative;z-index:3;
  opacity:0;animation:fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) forwards;animation-delay:1.0s;
}
.nav-btn{
  display:flex;align-items:center;gap:7px;
  background:var(--surface);border:1px solid var(--bdr);
  color:var(--txt-dim);padding:11px 22px;border-radius:4px;
  font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;
  backdrop-filter:blur(8px);white-space:nowrap;
  transition:background 0.22s,border-color 0.22s,color 0.22s,transform 0.18s,box-shadow 0.22s;
  -webkit-tap-highlight-color:transparent;
  min-height:44px;
}
.nav-btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:1.7;fill:none}
.nav-btn:hover{
  background:var(--accent-faint);
  border-color:rgba(201,169,110,0.30);
  color:var(--accent);transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(201,169,110,0.10),0 0 0 1px rgba(201,169,110,0.08);
}
.nav-btn:active{transform:translateY(0)}

/* ── Fixed CV button ───────────────────────────────────────────── */
.dl-btn{
  position:fixed;top:16px;right:16px;z-index:50;
  display:inline-flex;align-items:center;gap:6px;
  background:var(--surface);border:1px solid var(--bdr);color:var(--txt-faint);
  padding:9px 14px;border-radius:4px;font-size:11px;font-weight:600;
  letter-spacing:0.1em;text-transform:uppercase;
  backdrop-filter:blur(12px);white-space:nowrap;
  transition:all 0.22s;opacity:0;
  animation:fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) forwards;animation-delay:1.3s;
  min-height:44px;
}
.dl-btn:hover{
  background:var(--accent-faint);border-color:rgba(201,169,110,0.28);
  color:var(--accent);transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(201,169,110,0.10);
}
.dl-btn svg{width:12px;height:12px;stroke:currentColor;stroke-width:1.8;fill:none}

/* ── Overlay ─────────────────────────────────────────────────────  */
.overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(4,4,7,0.86);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  display:flex;align-items:flex-end;justify-content:center;padding:0 10px 10px;
  opacity:0;pointer-events:none;transition:opacity 0.24s;
}
.overlay.open{opacity:1;pointer-events:all}
@media(min-width:600px){.overlay{align-items:center;padding:24px}}

.panel{
  background:var(--panel-bg);
  border:1px solid rgba(255,255,255,0.065);
  border-top:1px solid rgba(201,169,110,0.14);
  border-radius:18px 18px 0 0;width:100%;max-width:560px;max-height:87vh;
  overflow-y:auto;padding:10px 20px 44px;
  transform:translateY(50px);opacity:0;
  transition:transform 0.44s cubic-bezier(0.22,1,0.36,1),opacity 0.28s;
  scrollbar-width:thin;scrollbar-color:rgba(201,169,110,0.12) transparent;
}
.panel::-webkit-scrollbar{width:2px}
.panel::-webkit-scrollbar-thumb{background:rgba(201,169,110,0.14);border-radius:2px}
.overlay.open .panel{transform:translateY(0);opacity:1}
@media(min-width:600px){.panel{border-radius:14px;max-height:90vh;padding:34px 38px 48px}}

.drag-handle{width:36px;height:3px;border-radius:2px;background:rgba(255,255,255,0.09);margin:10px auto 24px}
@media(min-width:600px){.drag-handle{display:none}}

/* ── Panel internals ─────────────────────────────────────────────  */
.panel-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}

.eyebrow{
  font-family:'Space Mono',monospace;font-size:8.5px;font-weight:400;
  letter-spacing:0.24em;text-transform:uppercase;color:var(--accent-dim);margin-bottom:10px;
}
.panel-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(26px,6vw,34px);letter-spacing:0.05em;
  color:var(--txt);line-height:0.95;
}
.close-btn{
  background:var(--surface);border:1px solid var(--bdr);color:var(--txt-faint);
  width:34px;height:34px;border-radius:4px;min-width:34px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all 0.2s;position:sticky;top:0;z-index:10;
}
.close-btn:hover{background:rgba(200,48,48,0.09);border-color:rgba(200,48,48,0.22);color:#c84444}
.close-btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:1.8;fill:none}

.lead{color:var(--txt-dim);font-size:13.5px;line-height:1.78;margin-bottom:20px}
.divider{height:1px;background:rgba(255,255,255,0.055);margin:22px 0}
.section-lbl{
  font-family:'Space Mono',monospace;font-size:8px;font-weight:400;
  letter-spacing:0.24em;text-transform:uppercase;color:var(--txt-faint);margin-bottom:12px;
}

.icon-pill{
  width:38px;height:38px;border-radius:8px;flex-shrink:0;
  background:var(--accent-faint);border:1px solid rgba(201,169,110,0.12);
  display:flex;align-items:center;justify-content:center;
}
.icon-pill svg{width:15px;height:15px;stroke:var(--accent-dim);stroke-width:1.6;fill:none}

/* ── Project cards ───────────────────────────────────────────────  */
.project-card{
  background:var(--surface);border:1px solid var(--bdr);border-radius:7px;
  padding:15px;cursor:pointer;margin-bottom:7px;
  display:flex;align-items:flex-start;gap:13px;
  transition:background 0.22s,border-color 0.22s,transform 0.2s,box-shadow 0.22s;
  -webkit-tap-highlight-color:transparent;
  min-height:44px;
}
.project-card:hover{
  background:var(--surface-h);border-color:rgba(201,169,110,0.20);
  transform:translateY(-2px);
  box-shadow:0 10px 32px rgba(0,0,0,0.55),0 0 20px rgba(201,169,110,0.06);
}
.proj-body{flex:1;min-width:0}
.proj-name{font-size:13.5px;font-weight:600;color:var(--txt);margin-bottom:3px;line-height:1.3}
.proj-tag{font-size:12px;color:var(--txt-dim);line-height:1.5}
.proj-year{font-family:'Space Mono',monospace;font-size:9px;color:var(--txt-faint);margin-top:5px;letter-spacing:0.08em}
.chevron{align-self:center;flex-shrink:0;color:var(--txt-faint)}
.chevron svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.8;fill:none}

/* Detail */
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.08em;
  color:var(--txt-dim);padding:7px 13px;border:1px solid var(--bdr);border-radius:4px;
  background:var(--surface);transition:all 0.2s;margin-bottom:18px;min-height:36px;
}
.back-btn:hover{color:var(--accent);border-color:rgba(201,169,110,0.26)}
.back-btn svg{width:11px;height:11px;stroke:currentColor;stroke-width:2;fill:none}

.detail-icon{
  width:50px;height:50px;border-radius:9px;
  background:var(--accent-faint);border:1px solid rgba(201,169,110,0.14);
  display:flex;align-items:center;justify-content:center;margin-bottom:16px;
}
.detail-icon svg{width:22px;height:22px;stroke:var(--accent-dim);stroke-width:1.5;fill:none}

.detail-title{
  font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.05em;
  color:var(--txt);margin-bottom:5px;line-height:1;
}
.detail-year{
  font-family:'Space Mono',monospace;font-size:8.5px;
  color:var(--txt-faint);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:16px;
}
.detail-desc{font-size:13.5px;color:var(--txt-dim);line-height:1.78;margin-bottom:18px}

.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:20px}
.tag{
  background:var(--accent-faint);border:1px solid rgba(201,169,110,0.13);
  color:var(--accent-dim);font-size:9.5px;font-weight:600;
  font-family:'Space Mono',monospace;
  padding:4px 10px;border-radius:3px;letter-spacing:0.07em;
}
.no-url{font-size:12px;color:var(--txt-faint);font-style:italic}

/* Buttons */
.cta-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--accent);color:#06060A;
  padding:12px 26px;border-radius:4px;
  font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;
  box-shadow:0 4px 28px rgba(201,169,110,0.26);
  transition:filter 0.22s,transform 0.18s,box-shadow 0.22s;
  min-height:44px;
}
.cta-btn:hover{filter:brightness(1.09);transform:translateY(-2px);box-shadow:0 8px 36px rgba(201,169,110,0.38)}
.cta-btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:2.2;fill:none}

.cta-ghost{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--surface);border:1px solid var(--bdr);
  color:var(--txt-dim);padding:12px 22px;border-radius:4px;
  font-size:11px;font-weight:600;letter-spacing:0.09em;text-transform:uppercase;
  transition:all 0.22s;min-height:44px;
}
.cta-ghost:hover{
  background:var(--surface-h);border-color:rgba(201,169,110,0.26);
  color:var(--accent);transform:translateY(-2px);
}
.cta-ghost svg{width:13px;height:13px;stroke:currentColor;stroke-width:1.8;fill:none}
.btn-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:4px}

/* Service + Contact */
.service-card{
  display:flex;align-items:flex-start;gap:13px;border:1px solid var(--bdr);
  border-radius:7px;padding:14px;margin-bottom:7px;background:var(--surface);
  transition:background 0.2s,border-color 0.2s,transform 0.2s;
}
.service-card:hover{background:var(--surface-h);border-color:rgba(201,169,110,0.18);transform:translateY(-1px)}
.service-title{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:3px}

// ── Particle constellation ──────────────────────────────────────────────────
(function(){
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H, pts = [];
  const mobile = window.innerWidth < 768;
  const COUNT  = mobile ? 32 : 60;
  const DIST   = mobile ? 95 : 135;

  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight }

  function Dot(){
    this.x  = Math.random()*W; this.y = Math.random()*H;
    this.vx = (Math.random()-.5)*.22; this.vy = (Math.random()-.5)*.22;
    this.r  = Math.random()*1.1+.25;
    this.a  = Math.random()*.3+.06;
  }

  function frame(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x += p.vx; p.y += p.vy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0;
      if(p.y<0)p.y=H; if(p.y>H)p.y=0;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,185,150,${p.a})`;
      ctx.fill();
    });
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<DIST){
          ctx.beginPath();
          ctx.moveTo(pts[i].x,pts[i].y);
          ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`rgba(200,185,150,${0.075*(1-d/DIST)})`;
          ctx.lineWidth=.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(frame);
  }

  resize();
  pts = Array.from({length:COUNT},()=>new Dot());
  frame();
  window.addEventListener('resize', resize);
})();

// ── Text scramble ───────────────────────────────────────────────────────────
const ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#@$%&!';
function scramble(el, final, delay, dur){
  setTimeout(()=>{
    let f=0; const total=Math.round(dur/16);
    const iv=setInterval(()=>{
      el.textContent=final.split('').map((c,i)=>{
        if(c===' ') return ' ';
        return (f/total) > (i/(final.replace(/ /g,'').length))
          ? c : ALPHA[Math.floor(Math.random()*ALPHA.length)];
      }).join('');
      if(++f>=total){ el.textContent=final; clearInterval(iv); }
    },16);
  }, delay);
}

function openPanel(type){
  document.getElementById('panel-content').innerHTML = renderPanel(type);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closePanel(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlayClick(e){
  if(e.target === document.getElementById('overlay')) closePanel();
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closePanel(); });

function renderPanel(t){
  if(t==='projects') return renderProjects();
  if(t==='business') return renderBusiness();
  if(t==='about')    return renderAbout();
  return '';
}

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">

    ${cta}`;
}
