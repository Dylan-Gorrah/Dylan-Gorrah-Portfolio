/* ── Variables ─────────────────────────────────────────────────── */
:root {

  --bdr:          rgba(255,255,255,0.08);

  --highlight:    rgba(220,200,160,0.25);

  --txt:          #F5F5F7;

  --i-out:      22px;
}

/* ── Reset ─────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow:hidden}

button{font-family:'Outfit',sans-serif;cursor:pointer;border:none;background:none}
svg{display:block;flex-shrink:0}

/* Hide scrollbars */
::-webkit-scrollbar{display:none}
html{scrollbar-width:none;-ms-overflow-style:none}

/* ── Background layers ─────────────────────────────────────────── */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,0.038) 1px,transparent 0);
  background-size:38px 38px;
  mask-image:radial-gradient(ellipse at center,black 25%,transparent 68%);
  -webkit-mask-image:radial-gradient(ellipse at center,black 25%,transparent 68%);
}
.scanlines{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.025) 3px,rgba(0,0,0,0.025) 4px);
}
.noise{
  position:fixed;inset:-50%;width:200%;height:200%;z-index:1;pointer-events:none;opacity:0.038;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:256px 256px;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(700px circle at var(--mx,50%) var(--my,50%),rgba(200,180,140,0.06),transparent 45%);
}
@media (hover:none), (pointer:coarse){
  body::after{display:none}
}

/* ── Orbit ─────────────────────────────────────────────────────── */
.orbit-scene{position:relative;width:var(--scene);height:var(--scene);margin:0 auto;flex-shrink:0}
.orbit-ring{position:absolute;top:50%;left:50%;border-radius:50%;transform:translate(-50%,-50%);border:1px solid rgba(255,255,255,0.055)}
.orbit-ring.r1{width:calc(var(--r-in)*2 + 8px);height:calc(var(--r-in)*2 + 8px);box-shadow:0 0 50px var(--cold),inset 0 0 50px var(--cold);border-color:rgba(110,148,255,0.12)}
.orbit-ring.r2{width:calc(var(--r-out)*2 + 8px);height:calc(var(--r-out)*2 + 8px);border-color:rgba(255,255,255,0.038);box-shadow:0 0 70px rgba(110,148,255,0.04)}
.orbit-ring.r3{width:calc(var(--r-out)*2 + 70px);height:calc(var(--r-out)*2 + 70px);border-color:rgba(255,255,255,0.016)}
.arm{position:absolute;top:50%;left:50%;width:0;height:0}
.arm-cw {animation:spinCW  30s linear infinite}
.arm-ccw{animation:spinCCW 50s linear infinite}

.icon-chip{
  position:absolute;display:flex;align-items:center;justify-content:center;border-radius:8px;
  background:rgba(10,9,15,0.96);border:1px solid rgba(255,255,255,0.082);
  box-shadow:0 4px 28px rgba(0,0,0,0.75),inset 0 1px 0 rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);transition:border-color 0.28s,box-shadow 0.28s;cursor:pointer;
}
.icon-chip:hover{border-color:rgba(220,200,160,0.40);box-shadow:0 4px 28px rgba(0,0,0,0.75),0 0 18px rgba(220,200,160,0.15),inset 0 1px 0 rgba(255,255,255,0.07)}

.ic-in{
  width:var(--i-in);height:var(--i-in);
  transform:translateX(var(--r-in)) translateY(-50%);
  animation:counterCW 30s linear infinite;
}
.ic-out{
  width:var(--i-out);height:var(--i-out);border-radius:6px;
  background:rgba(8,7,12,0.90);border:1px solid rgba(255,255,255,0.048);opacity:0.5;
  transform:translateX(var(--r-out)) translateY(-50%);
  animation:counterCCW 50s linear infinite;
}
.ic-in i{font-size:15px;color:var(--txt-dim)}
.ic-out i{font-size:11px;color:var(--txt-faint)}
@media(min-width:768px){.ic-in i{font-size:18px}.ic-out i{font-size:13px}}
@media(min-width:1024px){.ic-in i{font-size:21px}.ic-out i{font-size:15px}}

.devicon-nextjs-original{filter:brightness(0) invert(0.82) sepia(1) saturate(0) hue-rotate(0deg)}

@keyframes spinCW  {to{transform:rotate(360deg)}}
@keyframes spinCCW {to{transform:rotate(-360deg)}}
@keyframes counterCW {from{transform:translateX(var(--r-in))  translateY(-50%) rotate(0deg)}to{transform:translateX(var(--r-in))  translateY(-50%) rotate(-360deg)}}
@keyframes counterCCW{from{transform:translateX(var(--r-out)) translateY(-50%) rotate(0deg)}to{transform:translateX(var(--r-out)) translateY(-50%) rotate(360deg)}}

.scroll-hint{display:flex;align-items:center;gap:6px;color:rgba(245,245,247,0.35);font-size:11px;font-weight:500;letter-spacing:0.05em}

@keyframes scrollBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}

<script>
// ── Particle constellation ─────────────────────────────────────────────────-
(function(){
  const canvas = document.getElementById('particles');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  let W, H, pts = [];
  const mobile = window.innerWidth < 768;
  const COUNT  = mobile ? 32 : 60;
  const DIST   = mobile ? 95 : 135;

  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

  function Dot(){
    this.x  = Math.random()*W; this.y = Math.random()*H;
    this.vx = (Math.random()-.5)*.22; this.vy = (Math.random()-.5)*.22;
    this.r  = Math.random()*1.1+.25;
    this.a  = Math.random()*.3+.06;
  }

  function frame(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x += p.vx; p.y += p.vy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0;
      if(p.y<0)p.y=H; if(p.y>H)p.y=0;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(220,50,70,${p.a})`;
      ctx.fill();
    });
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<DIST){
          ctx.beginPath();
          ctx.moveTo(pts[i].x,pts[i].y);
          ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`rgba(220,50,70,${0.075*(1-d/DIST)})`;
          ctx.lineWidth=.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(frame);
  }

  resize();
  pts = Array.from({length:COUNT},()=>new Dot());
  frame();
  window.addEventListener('resize', resize);
})();

// ── Panel logic ────────────────────────────────────────────────────────────
function openPanel(type){
  document.getElementById('panel-content').innerHTML = renderPanel(type);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closePanel(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlayClick(e){
  if(e.target === document.getElementById('overlay')) closePanel();
}
document.addEventListener('keydown', e => { if(e.key === 'Escape') closePanel(); });

function renderPanel(t){
  if(t === 'projects') return renderProjects();
  if(t === 'business') return renderBusiness();
  if(t === 'about')    return renderAbout();
  if(t === 'miniAbout') return renderMiniAbout();
  return '';
}

// ── Projects list ──────────────────────────────────────────────────────────
function renderProjects(){
  const cards = projects.map((p, i) => `
    <div class="project-card" onclick="showDetail(${i})">
      <div class="icon-pill">${ic[p.icon]}</div>
      <div class="proj-body">
        <div class="proj-name">${p.name}</div>
        <div class="proj-tag">${p.tagline}</div>
        <div class="proj-year">${p.year}</div>
      </div>
      <div class="chevron">${ic.chevron}</div>
    </div>`).join('');
  return `
    <div class="panel-header">
      <div><p class="eyebrow">My Work</p><h2 class="panel-title">Projects</h2></div>
      <button class="close-btn" onclick="closePanel()">${ic.x}</button>
    </div>
    <p class="lead">Everything I've shipped — live sites, e-commerce platforms, internal tools, and open source. Tap any card to read more.</p>
    ${cards}`;
}

// ── Project detail ─────────────────────────────────────────────────────────
function showDetail(i){
  const p = projects[i];
  const tags = p.tech.map(t => `<span class="tag">${t}</span>`).join('');
  const isGithub = p.url && p.url.includes('github.com');
  const cta = p.url
    ? `<a href="${p.url}" target="_blank" rel="noopener noreferrer" class="cta-btn">${isGithub ? ic.github : ic.ext} ${isGithub ? 'View on GitHub' : 'View Live Site'}</a>`
    : `<p class="no-url">${p.year.includes('Progress') ? 'Currently in progress' : 'Internal project — not publicly hosted'}</p>`;
  document.getElementById('panel-content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center">
      <button class="back-btn" onclick="openPanel('projects')">${ic.arrow} All projects</button>
      <button class="close-btn" onclick="closePanel()">${ic.x}</button>
    </div>
    <div class="detail-icon">${ic[p.icon]}</div>
    <h2 class="detail-title">${p.name}</h2>
    <p class="detail-year">${p.year}</p>
    <p class="detail-desc">${p.desc}</p>
    <div class="tags">${tags}</div>
    ${cta}`;
}
